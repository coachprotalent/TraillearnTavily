services:
  searxng:
    # Version épinglée (pas `latest`) pour des déploiements reproductibles.
    image: searxng/searxng:2026.6.22-952896d29
    restart: unless-stopped
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      # NB : la clé secrète n'est PAS injectée par variable d'env. Quand on monte
      # notre propre settings.yml, l'image ne substitue pas le placeholder. La vraie
      # clé est écrite DANS searxng/settings.yml au déploiement (voir README §3).
    # Pas de ports exposés : accessible uniquement via le réseau interne Docker.
    healthcheck:
      # /healthz : sonde de vivacité SearXNG. python est présent dans l'image searxng.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  traillearn-search:
    build: .
    restart: unless-stopped
    depends_on:
      # Attend que SearXNG soit SAIN (pas seulement démarré) — évite les résultats
      # vides silencieux au démarrage à froid avant que SearXNG ne serve les requêtes.
      searxng:
        condition: service_healthy
    environment:
      - SEARXNG_URL=http://searxng:8080
      - SERVICE_PORT=8088
      - SCRAPE_CONCURRENCY=5
      - SCRAPE_FETCH_TIMEOUT_MS=15000
      - SCRAPE_MAX_CHARS=20000
      - SCRAPE_ALLOW_INSECURE_TLS=true
      # Auth Bearer : vide = désactivée. Définir LOCAL_SEARCH_TOKEN dans .env
      # pour l'activer (recommandé si BIND_HOST=0.0.0.0).
      - LOCAL_SEARCH_TOKEN=${LOCAL_SEARCH_TOKEN:-}
    ports:
      # BIND_HOST=127.0.0.1 (défaut, sécurisé : accessible seulement depuis la VM).
      # Mettre BIND_HOST=0.0.0.0 dans .env pour exposer le service à d'autres
      # machines (tests via navigateur distant). SI EXPOSÉ : activer
      # LOCAL_SEARCH_TOKEN et restreindre le port 8088 via le pare-feu / NSG Azure.
      - "${BIND_HOST:-127.0.0.1}:8088:8088"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
