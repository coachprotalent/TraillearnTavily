# Configuration minimale SearXNG : active la sortie JSON (indispensable pour l'API).
#
# `secret_key` : ce fichier est MONTÉ dans le conteneur, donc l'image ne substitue
# PAS automatiquement le placeholder ci-dessous (la substitution n'a lieu que pour
# un settings.yml auto-généré, pas pour un fichier monté). SearXNG REFUSE de
# démarrer tant que la valeur est `ultrasecretkey`. Au déploiement, on la remplace
# par une vraie clé aléatoire (voir README §3) :
#   sed -i "s/ultrasecretkey/$(openssl rand -hex 32)/" searxng/settings.yml
use_default_settings: true

server:
  secret_key: "ultrasecretkey"
  limiter: false
  image_proxy: false

search:
  formats:
    - html
    - json
